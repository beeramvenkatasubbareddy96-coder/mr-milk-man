<!DOCTYPE html>
<html>

<head>
    <title>Admin Panel - MR MILK MAN</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            margin: 0;
        }

        .header {
            background: brown;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 26px;
        }

        .container {
            width: 90%;
            margin: auto;
            margin-top: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0px 0px 10px gray;
        }

        th,
        td {
            padding: 15px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: brown;
            color: white;
        }

        .btn {
            padding: 8px 12px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            color: white;
            text-decoration: none;
        }

        .edit {
            background: green;
        }

        .delete {
            background: red;
        }

        .logout {
            background: black;
            float: right;
            margin: 10px;
        }
    </style>
</head>

<body>

    <div class="header">
        🐄 MR MILK MAN ADMIN PANEL
        <a href="/logout" class="btn logout">Logout</a>
    </div>

    <div class="container">

        <h2>All Orders</h2>

        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Product</th>
                <th>Actions</th>
            </tr>

            {% for order in orders %}
            <tr>
                <td>{{ order[0] }}</td>
                <td>{{ order[1] }}</td>
                <td>{{ order[2] }}</td>
                <td>{{ order[3] }}</td>
                <td>
                    <a href="/edit/{{ order[0] }}" class="btn edit">Edit</a>
                    <a href="/delete/{{ order[0] }}" class="btn delete">Delete</a>
                </td>
            </tr>
            {% endfor %}

        </table>

    </div>

</body>

</html>
